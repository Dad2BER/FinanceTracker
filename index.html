<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #0f1117;
      --color-surface: #1a1d27;
      --color-surface-2: #22263a;
      --color-border: #2e3248;
      --color-text: #e2e8f0;
      --color-text-dim: #718096;
      --color-primary: #6366f1;
      --color-primary-hover: #4f46e5;
      --color-danger: #ef4444;
      --color-danger-hover: #dc2626;
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-taxable: #3b82f6;
      --color-tax-free: #22c55e;
      --color-tax-deferred: #f59e0b;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── Typography ──────────────────────────────────────────────────────── */
    h1 { font-size: 1.75rem; font-weight: 700; }
    h2 { font-size: 1.1rem; font-weight: 600; }
    h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 1.1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-surface-2); color: var(--color-text); border: 1px solid var(--color-border); }
    .btn-secondary:hover { background: var(--color-border); }
    .btn-danger { background: var(--color-danger); color: #fff; }
    .btn-danger:hover { background: var(--color-danger-hover); }
    .btn-ghost { background: transparent; color: var(--color-text-dim); }
    .btn-ghost:hover { color: var(--color-text); background: var(--color-surface-2); }
    .btn-ghost.btn-danger { color: var(--color-danger); }
    .btn-ghost.btn-danger:hover { color: var(--color-danger); background: var(--color-surface-2); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-dim);
      font-size: 1rem;
      padding: 0.25rem 0.4rem;
      border-radius: var(--radius-sm);
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--color-surface-2); color: var(--color-text); }
    .icon-btn-danger:hover { color: var(--color-danger); }

    /* ── View Header ─────────────────────────────────────────────────────── */
    .view-header {
      margin-bottom: 1.75rem;
    }
    .view-header h1 { margin-bottom: 0; }
    .back-row { margin-bottom: 0.5rem; }
    .detail-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .header-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* ── Account Grid ────────────────────────────────────────────────────── */
    .account-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .account-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.25rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .account-card:hover {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 1px var(--color-primary)33;
    }

    .account-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .account-card-title { flex: 1; min-width: 0; }
    .account-name {
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .account-name:hover { color: var(--color-primary); }
    .account-card-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }

    .account-card-body { cursor: pointer; }
    .account-badge-row { margin-bottom: 0.6rem; }
    .account-value-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .account-holdings-count { font-size: 0.8rem; color: var(--color-text-dim); }
    .account-total-value { font-size: 1rem; font-weight: 600; color: var(--color-success); }

    /* ── Tax Badges ──────────────────────────────────────────────────────── */
    .tax-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }
    .badge-taxable { background: #1e3a5f; color: var(--color-taxable); }
    .badge-tax-free { background: #14532d; color: var(--color-tax-free); }
    .badge-tax-deferred { background: #451a03; color: var(--color-tax-deferred); }

    /* ── Holdings Table ──────────────────────────────────────────────────── */
    .account-total-banner {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .account-total-banner strong { color: var(--color-success); font-size: 1.05rem; }

    .table-wrapper {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .holdings-table th {
      background: var(--color-surface-2);
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-dim);
      border-bottom: 1px solid var(--color-border);
    }
    .holdings-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--color-border);
      vertical-align: middle;
    }
    .holdings-table tr:last-child td { border-bottom: none; }
    .holdings-table tr:hover td { background: var(--color-surface-2); }
    .align-right { text-align: right; }
    .symbol-cell { font-weight: 600; letter-spacing: 0.02em; }
    .price-cell { color: var(--color-text-dim); }
    .value-cell { color: var(--color-success); font-weight: 600; }
    .dim { color: var(--color-text-dim); }
    .actions-cell { width: 70px; text-align: right; white-space: nowrap; }

    /* ── Table Filter Row ────────────────────────────────────────────────── */
    .filter-row th {
      padding: 0.3rem 0.5rem;
      background: var(--color-surface-2);
    }
    .filter-input {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.25rem 0.5rem;
      color: var(--color-text);
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .filter-input:focus { border-color: var(--color-primary); }
    .filter-input::placeholder { color: var(--color-text-dim); opacity: 0.6; }
    .filter-select {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.25rem 0.4rem;
      color: var(--color-text);
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.15s;
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--color-primary); }
    .filter-daterange {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .filter-date {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.2rem 0.4rem;
      color: var(--color-text);
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .filter-date:focus { border-color: var(--color-primary); }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fadeIn 0.15s ease;
    }
    .modal-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.75rem;
      width: 100%;
      max-width: 420px;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: slideUp 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Forms ───────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
      color: var(--color-text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--color-primary); }
    .form-select { cursor: pointer; appearance: auto; }
    .field-error { display: block; font-size: 0.78rem; color: var(--color-danger); margin-top: 0.3rem; min-height: 1em; }
    .form-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* ── Manual Price Entry Modal ────────────────────────────────────────── */
    .manual-price-intro {
      font-size: 0.88rem;
      color: var(--color-text-dim);
      margin: 0.4rem 0 1.1rem;
      line-height: 1.5;
    }
    .manual-price-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 0.5rem; }
    .manual-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.6rem 0.75rem;
      background: var(--color-surface-2);
      border-radius: var(--radius-sm);
    }
    .manual-price-meta { display: flex; flex-direction: column; gap: 0.15rem; }
    .manual-price-symbol { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.03em; }
    .manual-price-hint { font-size: 0.76rem; color: var(--color-text-dim); }
    .manual-price-input-wrap { display: flex; align-items: stretch; flex-shrink: 0; }
    .manual-price-prefix {
      display: flex;
      align-items: center;
      padding: 0 0.55rem;
      background: var(--color-border);
      border: 1px solid var(--color-border);
      border-right: none;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      color: var(--color-text-dim);
      font-size: 0.9rem;
    }
    .manual-price-input {
      width: 110px !important;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
    }

    /* ── Confirm Dialog ──────────────────────────────────────────────────── */
    .confirm-dialog h3 { margin-bottom: 0.75rem; }
    .confirm-dialog p { color: var(--color-text-dim); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .confirm-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }

    /* ── Loading Spinner ─────────────────────────────────────────────────── */
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error Banner ────────────────────────────────────────────────────── */
    .error-banner {
      background: #3b0a0a;
      border: 1px solid #7f1d1d;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    /* ── Empty State ─────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-text-dim);
    }
    .empty-state p { margin-bottom: 1.25rem; }

    /* ── API Key Screen ──────────────────────────────────────────────────── */
    .key-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .key-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
    }
    .key-title {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .key-subtitle {
      color: var(--color-text-dim);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }
    .key-subtitle a, .key-hint a { color: var(--color-primary); }
    .key-input { font-family: monospace; font-size: 0.88rem; letter-spacing: 0.04em; }
    .key-actions {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .key-hint {
      color: var(--color-text-dim);
      font-size: 0.8rem;
      text-align: center;
    }

    /* ── Dashboard ───────────────────────────────────────────────────────── */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .summary-card h3 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-dim);
      margin-bottom: 1rem;
    }

    .chart-loading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--color-text-dim);
      font-size: 0.85rem;
      padding: 1rem 0;
    }

    .pie-chart-wrap {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .pie-svg {
      flex-shrink: 0;
      width: 130px;
      height: 130px;
    }

    .pie-legend {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.8rem;
      min-width: 0;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-label {
      flex: 1;
      color: var(--color-text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .legend-pct {
      font-size: 0.8rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── Accounts Section ─────────────────────────────────────────────────── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-dim);
      margin-bottom: 0.75rem;
    }
    .accounts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .table-empty-state {
      padding: 1.25rem 1rem;
      text-align: center;
      color: var(--color-text-dim);
      font-size: 0.9rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
    }

    /* ── Wide Modal ──────────────────────────────────────────────────────── */
    .modal-card-wide { max-width: 560px; }

    /* ── Balance Banner ──────────────────────────────────────────────────── */
    .balance-banner {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .balance-banner.balance-owed  { background: rgba(239,68,68,0.12);  color: var(--color-danger);  }
    .balance-banner.balance-clear { background: rgba(34,197,94,0.12);  color: var(--color-success); }

    /* ── Transaction Amounts ─────────────────────────────────────────────── */
    .amount-charge  { color: var(--color-success); font-weight: 600; }
    .amount-payment { color: var(--color-danger);  font-weight: 600; }

    /* ── Field Hints ─────────────────────────────────────────────────────── */
    .field-hint { font-size: 0.78rem; color: var(--color-text-dim); margin-top: 0.2rem; }
    .form-display-value {
      font-size: 0.9rem;
      color: var(--color-text);
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--color-border);
    }

    /* ── Settings Database Section ───────────────────────────────────────── */
    .settings-db-section {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
    }
    .settings-db-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: 1;
    }
    .settings-db-actions { display: flex; gap: 0.5rem; }
    .settings-db-restore-btn { color: var(--color-warning) !important; }

    /* ── Settings Toolbar ────────────────────────────────────────────────── */
    .settings-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .settings-cat-select { min-width: 160px; width: auto; flex-shrink: 0; }

    /* ── Settings Two-Panel ──────────────────────────────────────────────── */
    .settings-two-panel {
      display: grid;
      grid-template-columns: 220px 1fr;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 300px;
    }

    /* ── Subcategory Tabs (left panel) ───────────────────────────────────── */
    .settings-tabs-panel {
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
    }
    .settings-tabs-label {
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-dim);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }
    .settings-tab-item {
      display: flex;
      align-items: center;
      padding: 0.65rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      gap: 0.4rem;
    }
    .settings-tab-item:hover { background: var(--color-surface-2); }
    .settings-tab-item.active {
      border-left-color: var(--color-primary);
      background: var(--color-surface-2);
      font-weight: 600;
    }
    .settings-tab-name {
      flex: 1;
      font-size: 0.9rem;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .settings-tab-actions {
      display: flex;
      gap: 0.15rem;
      opacity: 0;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }
    .settings-tab-item:hover .settings-tab-actions,
    .settings-tab-item.active .settings-tab-actions { opacity: 1; }
    .settings-tab-add {
      padding: 0.5rem 0.75rem;
      border-top: 1px solid var(--color-border);
      margin-top: auto;
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    /* ── Payee Panel (right panel) ───────────────────────────────────────── */
    .settings-payee-panel { display: flex; flex-direction: column; }
    .settings-payee-header {
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-dim);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-2);
    }
    .settings-payee-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--color-border);
      font-size: 0.9rem;
      gap: 0.5rem;
    }
    .settings-payee-row:last-child { border-bottom: none; }
    .settings-payee-row:hover { background: var(--color-surface-2); }
    .settings-payee-name { flex: 1; }
    .settings-payee-actions { display: flex; gap: 0.15rem; flex-shrink: 0; }
    .settings-payee-empty {
      padding: 1.5rem 1rem;
      color: var(--color-text-dim);
      font-size: 0.88rem;
      font-style: italic;
    }
    .settings-payee-add {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--color-border);
      margin-top: auto;
    }

    /* ── Shared inline-add input ─────────────────────────────────────────── */
    .inline-add-input {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      width: 100%;
      outline: none;
    }
    .inline-add-input:focus { border-color: var(--color-primary); }

    /* ── Extra-Wide Modal ────────────────────────────────────────────────── */
    .modal-card-extra-wide { max-width: 780px; }

    /* ── Transaction Import ──────────────────────────────────────────────── */
    .import-modal { min-width: 0; }

    .import-preview {
      margin: 0.75rem 0 0;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .import-preview-label {
      padding: 0.35rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-dim);
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
    }
    .import-preview-table-wrap { overflow-x: auto; }
    .import-preview-table-wrap .holdings-table th,
    .import-preview-table-wrap .holdings-table td { padding: 0.4rem 0.6rem; font-size: 0.85rem; }

    .import-review-wrap {
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: 0.75rem;
    }
    .import-review-table th,
    .import-review-table td { padding: 0.35rem 0.5rem; font-size: 0.85rem; }
    .import-review-table thead th {
      position: sticky;
      top: 0;
      background: var(--color-surface-2);
      z-index: 1;
    }
    .imp-desc-cell {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .import-row-skipped td { opacity: 0.35; }
    .imp-dupe-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: var(--color-warning);
      color: #fff;
      margin-left: 0.4rem;
      vertical-align: middle;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* ── Reports ─────────────────────────────────────────────────────────── */
    .report-section {
      margin-bottom: 1.5rem;
    }
    .report-body {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
    }
    .report-bar-col {
      flex: 1;
      min-width: 0;
    }
    .report-pie-col {
      flex-shrink: 0;
      width: 210px;
    }
    .report-pie-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
    }
    .report-chart-wrap {
      width: 100%;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
    }
    .report-chart-wrap svg {
      display: block;
    }
    .report-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.25rem;
      padding: 0.25rem 0;
    }
    @media (max-width: 680px) {
      .report-body { flex-direction: column; }
      .report-pie-col { width: 100%; }
    }
    .report-tooltip {
      display: none;
      position: absolute;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      box-shadow: var(--shadow);
      min-width: 180px;
    }
    .rtt-month { font-weight: 700; margin-bottom: 0.15rem; }
    .rtt-total { color: var(--color-text-dim); font-size: 0.78rem; margin-bottom: 0.35rem; }
    .rtt-divider { height: 1px; background: var(--color-border); margin: 0.35rem 0; }
    .rtt-cat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 600;
      margin-top: 0.3rem;
    }
    .rtt-cat-name { flex: 1; }
    .rtt-val { flex-shrink: 0; }
    .rtt-sub {
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      padding-left: 1.2rem;
      color: var(--color-text-dim);
      font-size: 0.78rem;
      margin-top: 0.1rem;
    }
    .rtt-sub-name { flex: 1; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .accounts-grid  { grid-template-columns: 1fr; }
      .pie-svg { width: 110px; height: 110px; }
    }
    @media (max-width: 500px) {
      #app { padding: 1rem; }
      .modal-card { padding: 1.25rem; }
      .detail-title-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script type="module" src="src/app.js"></script>

</body>
</html>
